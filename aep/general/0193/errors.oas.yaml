openapi: 3.0.3
info:
  title: Library
  version: 1.0.0
components:
  schemas:
    Problem:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          format: uri
          description: >
            A URI reference that identifies the problem type. This serves as a
            permanent 
            identifier for the category of problem. May be a URI that doesn't
            resolve 
            (e.g., /problems/constraint-violation), about:blank for standard
            HTTP errors, 
            or a URL that leads to documentation.
          default: 'about:blank'
          example: '/problems/resource-unavailable'
        status:
          type: integer
          format: int32
          description: >
            The HTTP status code for this error. This matches the status code
            in the 
            HTTP response.
          minimum: 100
          maximum: 600
          exclusiveMaximum: true
          example: 409
        title:
          type: string
          description: >
            A brief summary of the error type. This will be the same for all
            occurrences of 
            this error.
          example: 'Resource Unavailable'
        detail:
          type: string
          description: >
            A detailed explanation of what went wrong with your specific
            request. This 
            describes the problem and may suggest how to resolve it.
          example:
            'The book "The Great Gatsby" is unavailable at the library
            "Garfield East". It is expected to be available again on
            2199-05-13.'
        instance:
          type: string
          format: uri
          description: >
            A unique identifier for this specific error occurrence. Use this
            when 
            contacting support to help identify your issue in logs.
          example: 'urn:uuid:f81d4fae-7dec-11d0-a765-00a0c91e6bf6'
        violations:
          type: array
          description: >
            A list of validation errors when your request data was invalid.
            Each item 
            describes which field had an issue and what the problem was.
          items:
            type: object
            required:
              - field
              - message
            properties:
              field:
                type: string
                description: The field that had a validation error
                example: 'email'
              message:
                type: string
                description: What was wrong with this field
                example: 'must be a valid email address'
        parameters:
          type: object
          description: >
            Additional data related to this error. These values are referenced
            in the 
            detail message and provided in a structured format for programmatic
            use.
          additionalProperties: true
          example:
            bookTitle: 'The Great Gatsby'
            library: 'Garfield East'
            expectedReturnDate: '2199-05-13'
