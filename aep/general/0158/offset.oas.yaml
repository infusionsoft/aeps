openapi: 3.1.0
info:
  title: Books API
  version: 1.0.0
paths:
  /publishers/{publisherId}/books:
    get:
      summary: List books for a publisher
      operationId: listBooks
      parameters:
        - name: publisherId
          in: path
          required: true
          schema:
            type: string
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            default: 20
            example: 50
          description: >
            The maximum number of results to return. The API will choose an
            appropriate default if not specified. The API may return fewer
            results than requested, even if not at the end of the collection.
        - name: pageNumber
          in: query
          required: false
          schema:
            type: integer
            default: 1
            example: 1
          description: >
            The page number to return, 1-indexed. Defaults to 1 if not
            specified.
      responses:
        '200':
          description: A paginated list of books.
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/Book'
                    description: >
                      The list of books for the current page.
                  total:
                    type: integer
                    description: >
                      The total number of results available. This field is optional and
                      may not always be present, as calculating it can be expensive.
components:
  schemas:
    Book:
      description: A representation of a single book.
      properties:
        name:
          type: string
          description: |
            The name of the book.
            Format: publishers/{publisherId}/books/{bookId}
        isbn:
          type: string
          description: |
            The ISBN (International Standard Book Number) for this book.
        title:
          type: string
          description: The title of the book.
        authors:
          type: array
          items:
            type: string
          description: The author or authors of the book.
