components:
  headers:
    LocationHeader:
      description: URI of the newly created resource
      schema:
        type: string
        format: uri
  schemas:
    book:
      properties:
        author:
          items:
            properties:
              familyName:
                type: string
              givenName:
                type: string
            type: object
          type: array
        edition:
          format: int32
          type: integer
        isbn:
          items:
            type: string
          type: array
        path:
          description:
            The server-assigned path of the resource, which is unique within
            the service.
          type: string
        price:
          format: int32
          type: integer
        published:
          type: boolean
      required:
        - edition
        - isbn
        - price
        - published
      type: object
    book-edition:
      properties:
        displayName:
          type: string
        path:
          description:
            The server-assigned path of the resource, which is unique within
            the service.
          type: string
      required:
        - displayName
      type: object
    isbn:
      properties:
        path:
          description:
            The server-assigned path of the resource, which is unique within
            the service.
          type: string
      type: object
    item:
      properties:
        book:
          type: string
        condition:
          type: string
        path:
          description:
            The server-assigned path of the resource, which is unique within
            the service.
          type: string
        price:
          format: double
          type: number
      required:
        - title
        - condition
        - price
      type: object
    publisher:
      properties:
        description:
          type: string
        path:
          description:
            The server-assigned path of the resource, which is unique within
            the service.
          type: string
      type: object
    store:
      properties:
        description:
          type: string
        name:
          type: string
        path:
          description:
            The server-assigned path of the resource, which is unique within
            the service.
          type: string
      required:
        - name
      type: object
